version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: lockerp_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - lockerp_network

  nginx:
    image: nginx:alpine
    container_name: lockerp_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - lockerp_network
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: lockerp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-lockerp}
      POSTGRES_USER: ${DB_USERNAME:-lockerp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - lockerp_network

networks:
  lockerp_network:
    driver: bridge

volumes:
  dbdata:
