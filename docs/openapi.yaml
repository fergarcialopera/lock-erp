# Lock-ERP API - OpenAPI 3.0
# Contrato entre backend (Laravel) y frontend.
# IMPORTANTE: Actualizar este fichero cada vez que se añada o modifique un endpoint.
# Ubicación de rutas en el proyecto: routes/api.php

openapi: 3.0.3
info:
  title: Lock-ERP API
  description: API REST del sistema Lock-ERP. Autenticación JWT Bearer en todos los endpoints excepto login.
  version: 1.0.0
  contact:
    name: Lock-ERP

servers:
  - url: /api/v1
    description: API v1

tags:
  - name: Auth
    description: Autenticación (login público, logout protegido)
  - name: Clinic
    description: Configuración de la clínica
  - name: Products
    description: CRUD de productos
  - name: Users
    description: CRUD de usuarios (solo ADMIN)
  - name: Lockers
    description: CRUD de lockers/armarios
  - name: Compartments
    description: CRUD de compartimentos
  - name: Inventory
    description: Inventario por compartimento
  - name: Dispenses
    description: Dispensaciones/retiradas desde locker (listado y detalle enriquecidos para vista)
  - name: Audit
    description: Logs de auditoría
  - name: Dashboard
    description: Resumen general para el panel de control

security:
  - bearerAuth: []

paths:
  # ---------- Auth ----------
  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      description: Devuelve un JWT. No requiere autenticación.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login correcto
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: bearer
                  expires_in:
                    type: integer
                    description: Segundos hasta expiración
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión
      description: Invalida el token actual. Requiere Bearer token.
      responses:
        '200':
          description: Logout correcto
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Successfully logged out

  # ---------- Clinic ----------
  /clinic:
    get:
      tags: [Clinic]
      summary: Obtener clínica del usuario
      responses:
        '200':
          description: Datos de la clínica
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Clinic' }

  /clinic/settings:
    patch:
      tags: [Clinic]
      summary: Actualizar configuración de la clínica
      description: Solo ADMIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [open_latency_ms]
              properties:
                open_latency_ms:
                  type: integer
                  minimum: 0
      responses:
        '200':
          description: Configuración actualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Settings updated successfully

  # ---------- Dashboard ----------
  /dashboard:
    get:
      tags: [Dashboard]
      summary: Información general para el Dashboard
      description: |
        Devuelve resumen de la aplicación para el panel de control:
        - Número de productos activos
        - Número de lockers disponibles (activos)
        - Dispensaciones pendientes de confirmar (status PENDING)
        - Si hay inventario bajo en algún producto
        - Últimas 5 dispensaciones (cualquier estado)
      responses:
        '200':
          description: Datos del dashboard
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Dashboard' }

  # ---------- Products ----------
  /products:
    get:
      tags: [Products]
      summary: Listar productos
      parameters:
        - name: active_only
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Lista de productos
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Product' }
    post:
      tags: [Products]
      summary: Crear producto
      description: ADMIN o RESPONSABLE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sku, name]
              properties:
                sku:
                  type: string
                name:
                  type: string
                barcode:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Producto creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '422':
          description: Validación fallida (ej. SKU duplicado)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /products/{id}:
    get:
      tags: [Products]
      summary: Obtener producto por ID
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    patch:
      tags: [Products]
      summary: Actualizar producto
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sku: { type: string }
                name: { type: string }
                barcode: { type: string, nullable: true }
                is_active: { type: boolean }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
        '404':
        '422':
    delete:
      tags: [Products]
      summary: Desactivar producto (soft)
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Product deactivated successfully
        '404':

  # ---------- Users ----------
  /users:
    get:
      tags: [Users]
      summary: Listar usuarios
      description: Solo ADMIN
      parameters:
        - name: active_only
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Lista de usuarios (sin password)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
    post:
      tags: [Users]
      summary: Crear usuario
      description: Solo ADMIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                role:
                  type: string
                  enum: [ADMIN, RESPONSABLE, READONLY]
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '422':

  /users/{id}:
    get:
      tags: [Users]
      summary: Obtener usuario por ID
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404':
    patch:
      tags: [Users]
      summary: Actualizar usuario
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8, nullable: true }
                role: { type: string, enum: [ADMIN, RESPONSABLE, READONLY] }
                is_active: { type: boolean }
      responses:
        '200':
        '404':
        '422':
    delete:
      tags: [Users]
      summary: Desactivar usuario (soft)
      description: No se puede desactivar el propio usuario
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User deactivated successfully
        '404':
        '422':

  # ---------- Lockers ----------
  /lockers:
    get:
      tags: [Lockers]
      summary: Listar lockers
      parameters:
        - name: active_only
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Locker' }
    post:
      tags: [Lockers]
      summary: Crear locker
      description: ADMIN o RESPONSABLE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                code: { type: string }
                name: { type: string }
                location: { type: string, nullable: true }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Locker' }
        '422':

  /lockers/{id}:
    get:
      tags: [Lockers]
      summary: Obtener locker con sus compartimentos
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - { $ref: '#/components/schemas/Locker' }
                  - type: object
                    properties:
                      compartments:
                        type: array
                        items: { $ref: '#/components/schemas/Compartment' }
        '404':
    patch:
      tags: [Lockers]
      summary: Actualizar locker
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string }
                name: { type: string }
                location: { type: string, nullable: true }
                is_active: { type: boolean }
      responses:
        '200':
        '404':
        '422':
    delete:
      tags: [Lockers]
      summary: Desactivar locker (soft)
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      responses:
        '200':
        '404':

  # ---------- Compartments ----------
  /compartments:
    get:
      tags: [Compartments]
      summary: Listar compartimentos
      parameters:
        - name: locker_id
          in: query
          schema:
            type: string
            format: ulid
        - name: active_only
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Compartment' }
    post:
      tags: [Compartments]
      summary: Crear compartimento
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locker_id, code]
              properties:
                locker_id: { type: string, format: ulid }
                code: { type: string }
                status:
                  type: string
                  enum: [AVAILABLE, MAINTENANCE]
                  nullable: true
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Compartment' }
        '404':
        '422':

  /compartments/{id}:
    get:
      tags: [Compartments]
      summary: Obtener compartimento por ID
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Compartment' }
        '404':
    patch:
      tags: [Compartments]
      summary: Actualizar compartimento
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string }
                status: { type: string, enum: [AVAILABLE, MAINTENANCE] }
                is_active: { type: boolean }
      responses:
        '200':
        '404':
        '422':
    delete:
      tags: [Compartments]
      summary: Desactivar compartimento (soft)
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      responses:
        '200':
        '404':

  # ---------- Inventory ----------
  /inventory:
    get:
      tags: [Inventory]
      summary: Listar inventario para vista (enriquecido)
      description: Cada ítem incluye product, compartment y locker resueltos (no solo IDs).
      parameters:
        - name: compartment_id
          in: query
          schema:
            type: string
            format: ulid
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/InventoryItemForDisplay' }

  /inventory/adjust:
    post:
      tags: [Inventory]
      summary: Ajustar stock en un compartimento
      description: ADMIN o RESPONSABLE
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [compartment_id, product_id, qty_available]
              properties:
                compartment_id: { type: string, format: ulid }
                product_id: { type: string, format: ulid }
                qty_available:
                  type: integer
                  minimum: 0
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Inventory adjusted

  /inventory/add:
    post:
      tags: [Inventory]
      summary: Ampliar unidades de un producto en un compartimento
      description: ADMIN o RESPONSABLE. Suma cantidad al stock disponible del producto en el compartimento. Crea la fila de inventario si no existe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [compartment_id, product_id, quantity]
              properties:
                compartment_id: { type: string, format: ulid }
                product_id: { type: string, format: ulid }
                quantity:
                  type: integer
                  minimum: 1
                  description: Unidades a añadir
      responses:
        '200':
          description: Stock ampliado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Inventory units added
                  compartment_inventory:
                    $ref: '#/components/schemas/CompartmentInventory'
        '404':
          description: Compartimento o producto no encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /inventory/remove:
    post:
      tags: [Inventory]
      summary: Retirar unidades de un producto en un compartimento
      description: ADMIN o RESPONSABLE. Pasa las unidades de disponible a reservado (qty_available → qty_reserved) y crea una dispensación en estado PENDING. La dispensación registra como responsable (requested_by_user_id) al usuario autenticado. Falla si no hay stock disponible suficiente.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [compartment_id, product_id, quantity]
              properties:
                compartment_id: { type: string, format: ulid }
                product_id: { type: string, format: ulid }
                quantity:
                  type: integer
                  minimum: 1
                  description: Unidades a retirar
      responses:
        '200':
          description: Stock retirado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Inventory units removed
                  compartment_inventory:
                    $ref: '#/components/schemas/CompartmentInventory'
                  dispense:
                    $ref: '#/components/schemas/Dispense'
        '400':
          description: Stock insuficiente en el compartimento
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Compartimento, producto o fila de inventario no encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /inventory/{id}:
    delete:
      tags: [Inventory]
      summary: Eliminar una entrada de inventario
      description: ADMIN o RESPONSABLE. Borra la fila de inventario (compartimento+producto) indicada por ID. La entrada debe pertenecer a la clínica del usuario.
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      responses:
        '200':
          description: Entrada eliminada
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Inventory entry deleted
        '404':
          description: Entrada de inventario no encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------- Dispenses ----------
  /dispenses:
    get:
      tags: [Dispenses]
      summary: Listar dispensaciones (para vista)
      description: |
        Devuelve dispensaciones con product, locker, compartment y requested_by resueltos.
        Las dispensaciones se crean al solicitar una retirada (POST /inventory/remove).
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, RETIRED, CANCELLED]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DispenseForDisplay' }

  /dispenses/{id}:
    get:
      tags: [Dispenses]
      summary: Obtener detalle de una dispensación
      description: Misma estructura enriquecida que un ítem del listado (product, locker, compartment, requested_by).
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DispenseForDisplay' }
        '404':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /dispenses/{id}/confirm-read:
    post:
      tags: [Dispenses]
      summary: Confirmar lectura/retiro de dispensación
      description: Concluye el flujo y marca la dispensación como RETIRED.
      parameters:
        - $ref: '#/components/parameters/UlidPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                occurred_at: { type: string, format: date-time }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Read confirmed
        '404':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---------- Audit ----------
  /audit-logs:
    get:
      tags: [Audit]
      summary: Listar últimos logs de auditoría
      description: ADMIN o RESPONSABLE. Últimos 100 registros.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AuditLog' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token obtenido de POST /auth/login

  parameters:
    UlidPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[0-9A-HJ-NP-Za-km-z]{26}$'
      description: ULID del recurso

  schemas:
    Dashboard:
      type: object
      description: Resumen general para el panel de control
      properties:
        active_products_count:
          type: integer
          description: Número de productos activos
        available_lockers_count:
          type: integer
          description: Número de lockers disponibles (activos)
        pending_dispenses_count:
          type: integer
          description: Dispensaciones pendientes de confirmar (PENDING)
        has_low_stock:
          type: boolean
          description: true si algún producto activo tiene stock total <= 0
        latest_dispenses:
          type: array
          description: Últimas 5 dispensaciones enriquecidas (product, locker, compartment, requested_by)
          items: { $ref: '#/components/schemas/DispenseForDisplay' }
      required:
        - active_products_count
        - available_lockers_count
        - pending_dispenses_count
        - has_low_stock
        - latest_dispenses

    Error:
      type: object
      properties:
        error:
          type: string
          description: Mensaje de error
      required: [error]

    Clinic:
      type: object
      properties:
        id: { type: string, format: ulid }
        name: { type: string }
        settings: { type: object, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    User:
      type: object
      description: Usuario (password nunca se expone)
      properties:
        id: { type: string, format: ulid }
        clinic_id: { type: string, format: ulid }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [ADMIN, RESPONSABLE, READONLY] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Product:
      type: object
      properties:
        id: { type: string, format: ulid }
        clinic_id: { type: string, format: ulid }
        sku: { type: string }
        name: { type: string }
        barcode: { type: string, nullable: true }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Locker:
      type: object
      properties:
        id: { type: string, format: ulid }
        clinic_id: { type: string, format: ulid }
        code: { type: string }
        name: { type: string }
        location: { type: string, nullable: true }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Compartment:
      type: object
      properties:
        id: { type: string, format: ulid }
        locker_id: { type: string, format: ulid }
        code: { type: string }
        status: { type: string, enum: [AVAILABLE, MAINTENANCE] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CompartmentInventory:
      type: object
      properties:
        id: { type: string, format: ulid }
        clinic_id: { type: string, format: ulid }
        compartment_id: { type: string, format: ulid }
        product_id: { type: string, format: ulid }
        qty_available: { type: integer }
        qty_reserved: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    DispenseForDisplay:
      type: object
      description: Dispensación con relaciones resueltas para vista (GET /dispenses, GET /dispenses/{id}, dashboard latest_dispenses).
      properties:
        id: { type: string, format: ulid }
        status: { type: string, enum: [PENDING, RETIRED, CANCELLED] }
        quantity: { type: integer }
        requested_at: { type: string, format: date-time }
        read_at: { type: string, format: date-time, nullable: true }
        external_ref: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time, nullable: true }
        product:
          type: object
          nullable: true
          properties:
            id: { type: string, format: ulid }
            sku: { type: string }
            name: { type: string }
            barcode: { type: string, nullable: true }
        locker:
          type: object
          nullable: true
          properties:
            id: { type: string, format: ulid }
            code: { type: string }
            name: { type: string }
            location: { type: string, nullable: true }
        compartment:
          type: object
          nullable: true
          properties:
